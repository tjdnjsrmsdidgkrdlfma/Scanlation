<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Scanlation — Settings</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <main class="card">
    <header>Scanlation <span class="sub">settings</span></header>

    <div class="field">
      <label for="endpoint">Server</label>
      <div class="inline">
        <input id="endpoint" type="text" placeholder="https://scanlation.takecontr.lol" />
        <button id="connect" class="primary">Connect</button>
      </div>
      <div id="status" class="status"></div>
    </div>

    <section id="conn" hidden>
      <div class="grid2">
        <div class="field"><label for="lang_src">From</label><select id="lang_src"></select></div>
        <div class="field"><label for="lang_dst">To</label><select id="lang_dst"></select></div>
      </div>
      <div class="field"><label for="detector">Detector</label><select id="detector"></select></div>
      <div class="field"><label for="recognizer">Recognizer</label><select id="recognizer"></select></div>
      <div class="field"><label for="translator">Translator</label><select id="translator"></select></div>

      <label class="chk"><input type="checkbox" id="showTranslated" /> Show translated <small>(off = original)</small></label>
    </section>

    <p class="tip">Translate a page with the toolbar icon (click to toggle). This page is settings only.</p>
  </main>

  <script type="module" src="src/options.js"></script>
</body>
</html>
