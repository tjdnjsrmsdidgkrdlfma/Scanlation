<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <canvas id="sky" aria-hidden="true"></canvas>
  <div class="app">
    <header class="brand">
      <img class="mark" src="icons/icon48.png" alt="" />
      <div class="brand-txt">
        <h1>Scanlation</h1>
        <p class="tagline">manga OCR + translation overlay</p>
      </div>
    </header>

    <div class="field">
      <label for="endpoint">Server</label>
      <div class="inline">
        <input id="endpoint" type="text" placeholder="https://scanlation.takecontr.lol" />
        <button id="connect" class="primary">Connect</button>
      </div>
      <div id="status" class="status"></div>
    </div>

    <div class="field">
      <label for="token">Token <span style="text-transform:none;font-weight:400;color:var(--muted)">(optional)</span></label>
      <input id="token" type="password" placeholder="X-Auth-Token (leave blank if none)" />
    </div>

    <section id="conn">
      <div class="rule"><span>languages</span></div>
      <div class="grid2">
        <div class="field"><label for="lang_src">From</label><select id="lang_src"></select></div>
        <div class="field"><label for="lang_dst">To</label><select id="lang_dst"></select></div>
      </div>

      <div class="rule"><span>engines</span></div>
      <div class="field"><label for="detector">Detector</label><select id="detector"></select></div>
      <div class="field"><label for="recognizer">Recognizer</label><select id="recognizer"></select></div>
      <div class="field"><label for="translator">Translator</label><select id="translator"></select></div>

      <div class="grid2 actions">
        <button id="enable" class="primary">Translate</button>
        <button id="disable" class="ghost">Clear</button>
      </div>
      <label class="chk"><input type="checkbox" id="showOriginal" /> Show original</label>
    </section>
  </div>

  <script src="src/constants.js"></script>
  <script src="src/starfield.js"></script>
  <script type="module" src="src/popup.js"></script>
</body>
</html>
