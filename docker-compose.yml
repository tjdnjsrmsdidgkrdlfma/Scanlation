# Scanlation server — single service (core-only image).
#
#   docker compose up -d --build
#   → http://127.0.0.1:4010/admin  (install engines, pick models/langs/prompt)
#
# The image is core-only: engines are pip-installed from GitHub when you click
# "install" in /admin (needs a reachable/public SCANLATION_ENGINE_REPO). TLS +
# public exposure are the HOST's job: the container is published on 127.0.0.1:4010 and the
# host nginx reverse-proxies your domain to it (see deploy/nginx.conf.example).
# LLM backends (ollama / llama.cpp) run outside the container; the translator
# plugins reach them via host.docker.internal.
services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: scanlation-server
    container_name: scanlation-server
    # localhost-only; the host nginx terminates TLS and proxies to this.
    # host 4010 -> container 4000 (uvicorn stays on 4000 inside).
    ports:
      - "127.0.0.1:4010:4000"
    volumes:
      - plugins:/plugins   # runtime-installed engine packages (survive recreation)
      - data:/data         # state.json, sqlite cache, model weights, HF cache
    environment:
      SCANLATION_DEVICE: cpu               # ctd + mangaocr run on CPU here
      # Public deploy: require the X-Auth-Token header on the API + admin. Put the
      # secret in a gitignored .env next to this file (SCANLATION_AUTH_TOKEN=...);
      # empty/absent = no auth. Enter the same value in the extension popup + /admin.
      SCANLATION_AUTH_TOKEN: ${SCANLATION_AUTH_TOKEN:-}
      # Engine source for /admin installs (defaults baked in the image). Pin a
      # tag for reproducible deploys:
      # SCANLATION_ENGINE_REF: v0.1.0
      # External LLM backends on the host (ollama on GPU, llama.cpp on Vulkan):
      OLLAMA_ENDPOINT: http://host.docker.internal:11434/api
      LLAMACPP_ENDPOINT: http://host.docker.internal:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach host services from the container (Linux)
    restart: unless-stopped

volumes:
  plugins:
  data:
