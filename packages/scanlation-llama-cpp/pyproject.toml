[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "scanlation-llama-cpp"
version = "0.1.0"
description = "llama.cpp / OpenAI-compatible LLM translator plugin for the Scanlation server."
requires-python = ">=3.11"
dependencies = [
    "scanlation-sdk",
    "httpx",
]

# Auto-discovered by the server registry once installed (no core edit needed).
[project.entry-points."scanlation.translators"]
"llama.cpp" = "scanlation_llama_cpp.plugin:LlamaCppTranslator"

[tool.setuptools.packages.find]
where = ["."]
include = ["scanlation_llama_cpp*"]
