[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "scanlation-ctd"
version = "0.1.0"
description = "comic-text-detector (ONNX) text-region detector plugin for the Scanlation server."
requires-python = ">=3.11"
dependencies = [
    "scanlation-sdk",
    "onnxruntime",
    "pyclipper",
    "opencv-python-headless",
]

# Auto-discovered by the server registry once installed (no core edit needed).
[project.entry-points."scanlation.detectors"]
ctd = "scanlation_ctd.plugin:CTDDetector"

[tool.setuptools.packages.find]
where = ["."]
include = ["scanlation_ctd*"]
