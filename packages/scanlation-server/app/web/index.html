<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scanlation · Admin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="head">
    <header class="topbar">
      <div class="brand">
        <h1>Scanlation <span class="muted">Admin</span></h1>
        <p class="sub" id="version" data-i18n="brand.sub"></p>
      </div>
      <div class="langtoggle" id="lang-toggle" role="group" aria-label="Language">
        <button class="langopt" data-lang="en">EN</button>
        <button class="langopt" data-lang="ko">KO</button>
      </div>
    </header>

    <nav class="tabbar" id="tabbar" hidden>
      <button class="tab active" data-view="models" data-i18n="tab.models"></button>
      <button class="tab" data-view="prompt" data-i18n="tab.prompt"></button>
      <button class="tab" data-view="options" data-i18n="tab.options"></button>
      <button class="tab" data-view="plugins" data-i18n="tab.plugins"></button>
      <button class="tab" data-view="behavior" data-i18n="tab.behavior"></button>
      <button class="tab" data-view="stats" data-i18n="tab.stats"></button>
      <button class="tab" data-view="maintenance" data-i18n="tab.maintenance"></button>
    </nav>
  </div>

  <main id="app" hidden>
    <!-- plugin selection -->
    <section class="card view active" data-view="models">
      <h2><span data-i18n="models.h2"></span> <span class="hint" data-i18n="models.hint"></span></h2>
      <div class="grid3">
        <label><span data-i18n="role.detector"></span><select id="sel-detector"></select></label>
        <label><span data-i18n="role.recognizer"></span><select id="sel-recognizer"></select></label>
        <label><span data-i18n="role.translator"></span><select id="sel-translator"></select></label>
      </div>
      <div class="row">
        <div class="grid2 langs">
          <label><span data-i18n="models.src"></span><select id="sel-lang_src"></select></label>
          <label><span data-i18n="models.dst"></span><select id="sel-lang_dst"></select></label>
        </div>
        <button class="btn primary" id="save-models" data-i18n="btn.save"></button>
      </div>
      <p class="note" data-i18n="models.deviceNote"></p>
    </section>

    <!-- translation prompt -->
    <section class="card view" data-view="prompt">
      <h2><span data-i18n="prompt.h2"></span> <span class="hint" data-i18n="prompt.hint"></span></h2>
      <div class="row">
        <label class="grow"><span data-i18n="prompt.preset"></span>
          <select id="prompt-preset"></select>
        </label>
        <button class="btn primary" id="prompt-use" data-i18n="prompt.use"></button>
        <button class="btn danger" id="prompt-delete" data-i18n="prompt.delete"></button>
      </div>
      <textarea id="prompt-text" rows="10" spellcheck="false"></textarea>
      <div class="row">
        <label class="grow"><span data-i18n="prompt.saveName"></span>
          <input id="prompt-name" type="text" data-i18n-ph="prompt.namePlaceholder" placeholder="" />
        </label>
        <button class="btn" id="prompt-save" data-i18n="prompt.save"></button>
      </div>
      <p class="note" data-i18n="prompt.note"></p>
    </section>

    <!-- plugin options -->
    <section class="card view" data-view="options">
      <h2><span data-i18n="options.h2"></span> <span class="hint" data-i18n="options.hint"></span></h2>
      <div id="engine-options"></div>
    </section>

    <!-- plugin installation -->
    <section class="card view" data-view="plugins">
      <h2><span data-i18n="plugins.h2"></span> <span class="hint" data-i18n="plugins.hint"></span></h2>
      <div id="plugins"></div>
    </section>

    <!-- behavior (extension client behavior settings) -->
    <section class="card view" data-view="behavior">
      <h2><span data-i18n="behavior.h2"></span> <span class="hint" data-i18n="behavior.hint"></span></h2>
      <div class="row">
        <label class="grow"><span data-i18n="behavior.minDim.label"></span>
          <div class="stepper">
            <button type="button" class="step-btn" data-step="-50" aria-label="decrease">−</button>
            <input id="min-image-dim" type="number" min="0" step="50" inputmode="numeric" />
            <button type="button" class="step-btn" data-step="50" aria-label="increase">+</button>
          </div>
        </label>
        <button class="btn primary" id="save-behavior" data-i18n="btn.save"></button>
      </div>
      <p class="note" data-i18n="behavior.minDim.desc"></p>
      <div class="row">
        <label class="opt-check grow"><input id="verbose-log" type="checkbox" /><span class="toggle"></span> <span data-i18n="behavior.verbose.label"></span></label>
      </div>
      <p class="note" data-i18n="behavior.verbose.desc"></p>
      <div class="row">
        <label class="grow"><span data-i18n="behavior.concurrency.label"></span>
          <div class="stepper">
            <button type="button" class="step-btn" data-step="-1" aria-label="decrease">−</button>
            <input id="translate-concurrency" type="number" min="1" step="1" inputmode="numeric" />
            <button type="button" class="step-btn" data-step="1" aria-label="increase">+</button>
          </div>
        </label>
      </div>
      <p class="note" data-i18n="behavior.concurrency.desc"></p>
      <div class="row">
        <label class="grow"><span data-i18n="behavior.idleUnload.label"></span>
          <div class="stepper">
            <button type="button" class="step-btn" data-step="-1" aria-label="decrease">−</button>
            <input id="model-idle-unload-minutes" type="number" min="0" step="1" inputmode="numeric" />
            <button type="button" class="step-btn" data-step="1" aria-label="increase">+</button>
          </div>
        </label>
      </div>
      <p class="note" data-i18n="behavior.idleUnload.desc"></p>
      <div class="row">
        <label class="grow"><span data-i18n="behavior.backend.label"></span>
          <select id="torch-backend">
            <option value="cpu">CPU</option>
            <option value="gpu">GPU</option>
          </select>
        </label>
      </div>
      <div class="row" id="torch-vendor-row" hidden>
        <label class="grow"><span data-i18n="behavior.vendor.label"></span>
          <select id="torch-vendor">
            <option value="amd">AMD (ROCm)</option>
            <option value="nvidia">NVIDIA (CUDA)</option>
          </select>
        </label>
      </div>
      <div class="row" id="torch-index-row" hidden>
        <label class="grow"><span data-i18n="behavior.torchIndex.label"></span>
          <input id="torch-index" type="text" placeholder="https://download.pytorch.org/whl/rocm6.2" />
        </label>
      </div>
      <p class="note" id="torch-note"></p>
      <p class="note" data-i18n="behavior.backend.desc"></p>
    </section>

    <!-- stats -->
    <section class="card view" data-view="stats">
      <h2><span data-i18n="stats.h2"></span> <span class="hint" data-i18n="stats.hint"></span></h2>
      <h3 data-i18n="stats.pages"></h3>
      <div id="stats-pages"></div>
      <h3 data-i18n="stats.regions"></h3>
      <div id="stats-regions"></div>
      <div class="row">
        <div class="grow"><p class="note" data-i18n="stats.clear.desc"></p></div>
        <button class="btn danger" id="clear-stats" data-i18n="stats.clear.btn"></button>
      </div>
    </section>

    <!-- maintenance -->
    <section class="card view" data-view="maintenance">
      <h2><span data-i18n="maint.h2"></span> <span class="hint" data-i18n="maint.hint"></span></h2>
      <div class="row">
        <div class="grow">
          <strong data-i18n="maint.cache.title"></strong>
          <p class="note" data-i18n="maint.cache.desc"></p>
        </div>
        <button class="btn danger" id="clear-cache" data-i18n="maint.cache.btn"></button>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" hidden></div>

  <!-- login gate: only shown when the server requires a token -->
  <div id="gate" class="gate" hidden>
    <form id="gate-form" class="gate-card">
      <h2 data-i18n="gate.title"></h2>
      <p class="note" data-i18n="gate.hint"></p>
      <input id="gate-token" type="password" autocomplete="current-password" spellcheck="false"
             data-i18n-ph="gate.tokenPh" placeholder="" />
      <button type="submit" class="btn primary" data-i18n="gate.submit"></button>
      <p id="gate-err" class="gate-err" data-i18n="gate.wrong" hidden></p>
    </form>
  </div>

  <script src="i18n.js"></script>
  <script src="app.js"></script>
</body>
</html>
