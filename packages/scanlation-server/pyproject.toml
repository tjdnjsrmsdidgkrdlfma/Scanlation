[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "scanlation-server"
version = "0.1.0"
description = "Contract-based manga OCR + in-place translation server (core; engines are separate pip packages)."
requires-python = ">=3.11"
dependencies = [
    "scanlation-sdk",
    "fastapi",
    "uvicorn[standard]",
    "numpy",
    "pillow",
    "opencv-python-headless",
    "httpx",
    "pydantic>=2",
]

# --- Engine discovery is entry_points-only (no hardcoded map). The core ships NO
# engine at all: real engines (comic-text-and-bubble-detector, manga-ocr, Ollama, llama.cpp) are separate pip
# packages declaring the `scanlation.<role>` groups, auto-discovered on install.
# A fresh install has no engines — running without one is a 400. (Tests register
# their own fakes; see tests/fake_engines.py.) ---
[tool.setuptools.packages.find]
where = ["."]
include = ["app*"]

# Ship the admin SPA (app/web/*.html,js,css) inside the wheel so a non-editable
# install (Docker) serves /admin. Editable/dev installs read the source directly.
[tool.setuptools.package-data]
app = ["web/*"]
