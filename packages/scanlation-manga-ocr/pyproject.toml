[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "scanlation-manga-ocr"
version = "0.1.0"
description = "manga-ocr (kha-white) Japanese text recognizer plugin for the Scanlation server."
requires-python = ">=3.11"
dependencies = [
    "scanlation-sdk",
    "manga-ocr",
    # manga-ocr-base's tokenizer is a slow-only BertJapaneseTokenizer (MeCab word +
    # character subword, no tokenizer.json). transformers 5.13 dropped the slow
    # fallback and forces the fast/tokenizers backend, which can't build this
    # tokenizer at all: load() dies with "Couldn't instantiate the backend
    # tokenizer ... need sentencepiece" — a red herring, sentencepiece and
    # use_fast=False both fail to help. Cap below 5.13 so the slow tokenizer loads.
    # 5.12.1 is verified working and also satisfies the detector (>=4.45) and
    # paddleocr-vl (>=5.0) that share the /plugins env.
    "transformers<5.13",
]

# Auto-discovered by the server registry once installed (no core edit needed).
[project.entry-points."scanlation.recognizers"]
manga-ocr = "scanlation_manga_ocr.plugin:MangaOcrRecognizer"

[tool.setuptools.packages.find]
where = ["."]
include = ["scanlation_manga_ocr*"]
