[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "scanlation-manga-ocr"
version = "0.1.0"
description = "manga-ocr (kha-white) Japanese text recognizer plugin for the Scanlation server."
requires-python = ">=3.11"
dependencies = [
    "scanlation-sdk",
    "manga-ocr",
    # manga-ocr-base ships a slow-only BertJapaneseTokenizer (no tokenizer.json).
    # transformers 5.x routes it through the fast/tokenizers backend, whose
    # slow->fast conversion needs sentencepiece (or tiktoken) present — and
    # manga-ocr doesn't declare it. Without this the recognizer load raises
    # "Couldn't instantiate the backend tokenizer ... need sentencepiece".
    "sentencepiece",
]

# Auto-discovered by the server registry once installed (no core edit needed).
[project.entry-points."scanlation.recognizers"]
manga-ocr = "scanlation_manga_ocr.plugin:MangaOcrRecognizer"

[tool.setuptools.packages.find]
where = ["."]
include = ["scanlation_manga_ocr*"]
