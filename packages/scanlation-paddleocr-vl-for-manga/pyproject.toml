[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "scanlation-paddleocr-vl-for-manga"
version = "0.1.0"
description = "PaddleOCR-VL manga fine-tune VLM recognizer plugin for the Scanlation server."
requires-python = ">=3.11"
dependencies = [
    "scanlation-sdk>=0.1.0",
    # PaddleOCR-VL loads via the NATIVE transformers path (AutoModelForImageTextToText,
    # no trust_remote_code); that support landed in transformers 5.x — the repo's own
    # remote code is upstream-broken. So pin >=5.0, not the >=4.45 the other plugins use.
    # <5.13 is a shared-env cap: manga-ocr can't load on 5.13 (see its pyproject) and
    # shares the /plugins transformers. paddleocr_vl is natively supported on 5.12.x.
    "transformers>=5.0,<5.13",
    "torch",
    # transformers' device_map= load path (plugin._load) requires accelerate.
    "accelerate",
    "huggingface_hub",
    "pillow",
]

# Auto-discovered by the server registry once installed (no core edit needed).
# Group is PLURAL — matches app/registry.py ROLES ("recognizer" -> "scanlation.recognizers").
[project.entry-points."scanlation.recognizers"]
PaddleOCR-VL-For-Manga = "scanlation_paddleocr_vl_for_manga.plugin:PaddleOcrVLForMangaRecognizer"

[tool.setuptools.packages.find]
where = ["."]
include = ["scanlation_paddleocr_vl_for_manga*"]
