[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "scanlation-ollama"
version = "0.1.0"
description = "ollama LLM translator plugin for the Scanlation server (talks to a local ollama server over HTTP)."
requires-python = ">=3.11"
dependencies = [
    "scanlation-sdk",
    "httpx",
]

# Auto-discovered by the server registry once installed (no core edit needed).
[project.entry-points."scanlation.translators"]
ollama = "scanlation_ollama.plugin:OllamaTranslator"

[tool.setuptools.packages.find]
where = ["."]
include = ["scanlation_ollama*"]
